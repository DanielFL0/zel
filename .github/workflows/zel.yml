name: Build and Test Zel

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Compile with GCC
        run: |
          gcc -Wall -Wextra -o zel src/*.c

      - name: Run tests
        run: |
          chmod +x tests/test.sh
          tests/test.sh